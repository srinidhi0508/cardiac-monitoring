<!DOCTYPE html>
<html>
<head>
    <title>Patient Login - CardioAI</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 min-h-screen flex items-center justify-center">

<div class="bg-white p-10 rounded-2xl shadow-xl w-96">
    <h1 class="text-3xl font-bold text-red-600 mb-6 text-center">Patient Login</h1>

    <form method="POST" action="/patient_login" class="space-y-4">

        <input type="text" name="username"
               placeholder="Username"
               class="w-full p-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-red-400"
               required>

        <input type="password" name="password"
               placeholder="Password"
               class="w-full p-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-red-400"
               required>

        <button type="submit"
                class="w-full bg-red-500 text-white py-3 rounded-lg hover:bg-red-600 transition">
            Login
        </button>
    </form>

</div>

</body>
</html>
