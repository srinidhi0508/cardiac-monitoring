<!DOCTYPE html>
<html>
<head>
    <title>Cardiac Monitoring Dashboard</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #0f172a;
            color: white;
        }
        .card {
            background-color: #1e293b;
        }
    </style>
</head>

<body class="p-4">

<h2 class="mb-4">🫀 Cardiac Monitoring Dashboard</h2>

<div class="row">
    <div class="col-md-4">
        <div class="card p-3">
            <h4>Heart Rate</h4>
            <h2 id="heartRate">-- BPM</h2>
        </div>
    </div>

    <div class="col-md-4">
        <div class="card p-3">
            <h4>10-Year Risk</h4>
            <h2 id="risk">-- %</h2>
        </div>
    </div>

    <div class="col-md-4">
        <div class="card p-3">
            <h4>Diagnosis</h4>
            <h2 id="diagnosis">--</h2>
        </div>
    </div>
</div>

<div class="card mt-4 p-3">
    <h4>ECG Signal</h4>
    <canvas id="ecgChart"></canvas>
</div>

<script>
    var ctx = document.getElementById('ecgChart').getContext('2d');

    var ecgChart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: [],
            datasets: [{
                label: 'ECG',
                data: [],
                borderColor: 'lime',
                borderWidth: 1,
                pointRadius: 0
            }]
        },
        options: {
            animation: false,
            scales: {
                x: { display: false },
                y: { min: -2, max: 2 }
            }
        }
    });

    var socket = io();

    socket.on('update_data', function(data) {
        document.getElementById("heartRate").innerText = data.heart_rate + " BPM";
        document.getElementById("risk").innerText = data.risk + " %";
        document.getElementById("diagnosis").innerText = data.diagnosis;

        ecgChart.data.labels.push('');
        ecgChart.data.datasets[0].data.push(data.ecg);

        if (ecgChart.data.labels.length > 50) {
            ecgChart.data.labels.shift();
            ecgChart.data.datasets[0].data.shift();
        }

        ecgChart.update();
    });
</script>

</body>
</html>
